name: Schema Validation

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  validate-schema:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Validate processed datasets
        run: |
          python3 scripts/validate_domain_registry.py
          python3 scripts/validate_schema.py data/processed

      - name: Validate relationship maps
        run: |
          python3 scripts/validate_relationships.py data/relationships --processed-dir data/processed
