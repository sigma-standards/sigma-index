name: Publish Pages

on:
  workflow_dispatch:
  push:
    branches:
      - main

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Build data bundle
        run: |
          python3 scripts/extract_relationships.py
          python3 scripts/validate_domain_registry.py
          python3 scripts/validate_schema.py data/processed
          python3 scripts/validate_relationships.py data/relationships --processed-dir data/processed
          python3 scripts/build_domain_coverage.py
          python3 scripts/build_release.py

      - name: Build static site
        run: |
          python3 scripts/build_static_site.py

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: public

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
