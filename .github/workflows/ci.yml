name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  checks: write
  pull-requests: write

jobs:
  validate:
    name: Validate Schema & Quality
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4 SPARQLWrapper pandas openpyxl pyarrow lxml pytest

      - name: Validate schema
        run: python3 scripts/validate_schema.py
        
      - name: Validate relationships
        run: python3 scripts/validate_relationships.py
        
      - name: Check duplicate IDs
        run: python3 scripts/check_duplicate_ids.py
        
      - name: Run tests
        run: python3 -m pytest -q --tb=short tests/

  security:
    name: Security Checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: 'python'

      - name: Autobuild
        uses: github/codeql-action/autobuild@v3

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3

  urls:
    name: URL Health Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests beautifulsoup4 pandas

      - name: Check URLs
        run: python3 scripts/check_urls.py

  required-checks:
    name: Check Required Gates
    needs: [validate, security, urls]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Verify all checks passed
        run: |
          if [ "${{ needs.validate.result }}" != "success" ] || \
             [ "${{ needs.security.result }}" != "success" ] || \
             [ "${{ needs.urls.result }}" != "success" ]; then
            echo "❌ Required quality gates failed"
            exit 1
          fi
          echo "✅ All quality gates passed"
