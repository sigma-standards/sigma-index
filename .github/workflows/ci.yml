name: CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install package and test dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run deterministic validation
        run: make PYTHON=python3 validate

      - name: Build release artifacts and reports
        run: make PYTHON=python3 release

      - name: Run tests
        run: python -m pytest

      - name: Upload validation reports
        uses: actions/upload-artifact@v7
        with:
          name: sigma-validation-reports
          path: |
            data/reports/*.csv
            docs/QUALITY_GATE.md
            docs/RESEARCH_TASKS.md

      - name: Upload release manifest
        uses: actions/upload-artifact@v7
        with:
          name: sigma-release-manifest
          path: |
            dist/api_index.json
            dist/domain_coverage.csv
