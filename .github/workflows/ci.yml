name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

permissions:
  contents: read
  checks: write
  pull-requests: write

jobs:
  validate:
    name: Validate Schema & Quality
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run deterministic validation
        run: make PYTHON=python3 validate

      - name: Check duplicate IDs
        run: python3 -m scripts.check_duplicate_ids

      - name: Build release manifest
        run: make PYTHON=python3 release

      - name: Upload validation reports
        uses: actions/upload-artifact@v7
        with:
          name: sigma-validation-reports
          path: |
            data/reports/*.csv
            docs/QUALITY_GATE.md
            docs/RESEARCH_TASKS.md
            docs/RELATIONSHIP_QUALITY.md

      - name: Upload release manifest
        uses: actions/upload-artifact@v7
        with:
          name: sigma-release-manifest
          path: |
            dist/api_index.json
            dist/domain_coverage.csv

      - name: Run tests
        run: python3 -m pytest -q --tb=short tests/

  security:
    name: Security Checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Run Gitleaks
        run: |
          docker run --rm \
            -v "$PWD:/repo" \
            zricethezav/gitleaks:latest \
            detect --source=/repo --no-git --redact --verbose

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: 'python'

      - name: Autobuild
        uses: github/codeql-action/autobuild@v4

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4

  urls:
    name: URL Health Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests beautifulsoup4 pandas

      - name: Check URLs
        run: make PYTHON=python3 check-urls

  required-checks:
    name: Check Required Gates
    needs: [validate, security, urls]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Verify all checks passed
        run: |
          if [ "${{ needs.validate.result }}" != "success" ] || \
             [ "${{ needs.security.result }}" != "success" ] || \
             [ "${{ needs.urls.result }}" != "success" ]; then
            echo "❌ Required quality gates failed"
            exit 1
          fi
          echo "✅ All quality gates passed"
